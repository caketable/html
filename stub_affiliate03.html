<html>
    <head>
        <script type="text/javascript">
        "use strict";
        function getQueryParam (name) {
            var query = window.location.search.substring(1);
            var vars = query.split("&");
            for (var i = 0; i < vars.length; i++) {
                var pair = vars[i].split("=");
                if (pair[0] === name) {
                    return pair[1];
                }
            }
        };

        function RedirectIntotheAPP() {
            document.domain = "hbogo.com";
            var redirectTo = getQueryParam("RelayState");
            if (redirectTo === undefined) {
                document.getElementById("demo").innerHTML = "ERROR: \"RelayState\" NOT FOUND!";
            } else {
                redirectTo = decodeURIComponent(redirectTo);
                document.getElementById("demo").innerHTML = "Will redirect to: " + redirectTo;
                setTimeout(function()   {
                    var redirectTo = getQueryParam("RelayState");
                    if (redirectTo === undefined) {
                        document.getElementById("demo").innerHTML = "ERROR: \"RelayState\" NOT FOUND!";
                    } else {
                        window.location.href = redirectTo;
                    }
                }, 2000);
            }
        };
        </script>
    </head>
    <body onload="RedirectIntotheAPP()" bgcolor="#E6E6FA">
        <h1>Affiliate 03! This affiliate should redirect back into the app after in 2 seconds.</h1>
        <p id="demo"></p>
    </body>
</html>
