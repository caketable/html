<html>
    <head>
        <script type="text/javascript">
        "use strict";
        function getQueryParam (name) {
            var query = window.location.search.substring(1);
            var vars = query.split("&");
            for (var i = 0; i < vars.length; i++) {
                var pair = vars[i].split("=");
                if (pair[0] === name) {
                    return pair[1];
                }
            }
        };

        function setupAffiliate() {
            document.domain = "hbogo.com";
            setTimeout(function() {
                document.getElementById("demo").innerHTML = "Login Failed: " + Date();
                var redirectTo = getQueryParam("RelayState");
                redirectTo = decodeURIComponent(redirectTo);
                window.location.href = redirectTo + "?message=loginFailureWithMessage&affiliateCode=08&errorMessage=" + encodeURIComponent("stub Affiliate 2 - failing logon");
            }, 2000);
        };
        </script>
    </head>
    <body body onload="setupAffiliate()" bgcolor="#E6E6FA">
        <h1>Affiliate 02!</h1>
        <p id="demo">This affiliate will fail login after 2 seconds</p>
    </body>
</html>
