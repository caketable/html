<html>
    <head>
        <script type="text/javascript">
        "use strict";
        function getQueryParam (name) {
            var query = window.location.search.substring(1);
            var vars = query.split("&");
            for (var i = 0; i < vars.length; i++) {
                var pair = vars[i].split("=");
                if (pair[0] === name) {
                    return pair[1];
                }
            }
        };

        function setupAffiliate() {
            setTimeout(function()   {
                document.getElementById("demo").innerHTML = "Asked parent to openRegistration! " + Date();
                var redirectTo = getQueryParam("RelayState");
                redirectTo = decodeURIComponent(redirectTo);
                window.location.href = redirectTo + "?message=openRegistration";
            }, 2000);
        };
        </script>
    </head>
    <body body onload="setupAffiliate()" bgcolor="#E6E6FA">
        <h1>Affiliate Opens Registration</h1>
        <p id="demo">This affiliate will ask parent to open registration after 2 seconds</p>
    </body>
</html>
